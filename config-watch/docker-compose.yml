services:
  consul:
    image: hashicorp/consul:1.22.6
    container_name: consul
    restart: unless-stopped

    ports:
      - "8500:8500"       # HTTP API + Web UI
      - "8600:8600/tcp"   # DNS
      - "8600:8600/udp"   # DNS

    command:
      - agent
      - -dev
      - -ui
      - -client=0.0.0.0
      - -bind=0.0.0.0

    volumes:
      - consul-data:/consul/data

volumes:
  consul-data: