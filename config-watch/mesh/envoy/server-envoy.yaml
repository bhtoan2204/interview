# server-envoy: the INGRESS sidecar.
#
# - Terminates mTLS on 0.0.0.0:8443: requires a client cert, validates it
#   against the CA and pins the caller identity to SAN "client.mesh.local".
# - Forwards decrypted plaintext HTTP to server-app on localhost:8080.
#
# server-app stays a plain HTTP server; this proxy enforces who may call it.
admin:
  address:
    socket_address: { address: 0.0.0.0, port_value: 9901 }

static_resources:
  listeners:
    - name: ingress
      address:
        socket_address: { address: 0.0.0.0, port_value: 8443 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: local
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: local_app }
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
          transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
              require_client_certificate: true
              common_tls_context:
                tls_certificates:
                  - certificate_chain: { filename: /etc/envoy/certs/server.crt }
                    private_key: { filename: /etc/envoy/certs/server.key }
                validation_context:
                  trusted_ca: { filename: /etc/envoy/certs/ca.crt }
                  match_typed_subject_alt_names:
                    - san_type: DNS
                      matcher: { exact: client.mesh.local }

  clusters:
    - name: local_app
      type: STATIC
      connect_timeout: 1s
      load_assignment:
        cluster_name: local_app
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: 127.0.0.1, port_value: 8080 }
